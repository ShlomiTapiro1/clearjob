<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרסום משרה — ClearJob</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .create-layout { max-width: 860px; margin: 0 auto; padding: var(--s6) var(--s4) var(--s12); }

    /* Steps Bar */
    .steps-bar {
      background: #fff; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-xl); padding: var(--s5) var(--s6);
      margin-bottom: var(--s6);
      overflow-x: auto;
    }
    .steps-bar-inner { display: flex; align-items: center; min-width: max-content; }
    .step-item { display: flex; align-items: center; gap: var(--s2); flex-shrink: 0; }
    .step-circle {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--fs-xs); font-weight: 800;
      background: var(--gray-100); color: var(--gray-500);
      transition: all var(--transition-md); flex-shrink: 0;
    }
    .step-circle.active { background: var(--primary-600); color: #fff; box-shadow: 0 0 0 4px var(--primary-100); }
    .step-circle.done   { background: var(--teal-600); color: #fff; }
    .step-text { font-size: var(--fs-xs); font-weight: 600; color: var(--gray-400); white-space: nowrap; }
    .step-text.active { color: var(--primary-700); }
    .step-text.done   { color: var(--teal-700); }
    .step-connector-line { flex: 0 0 40px; height: 2px; background: var(--gray-200); margin: 0 var(--s2); transition: background var(--transition-md); }
    .step-connector-line.done { background: var(--teal-400); }

    /* Form Card */
    .form-card {
      background: #fff; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-xl); overflow: hidden;
    }
    .form-card-header {
      padding: var(--s5) var(--s7);
      border-bottom: 1px solid var(--gray-200);
      background: linear-gradient(135deg, var(--primary-50), #fff);
      display: flex; align-items: center; gap: var(--s3);
    }
    .form-card-header-icon {
      width: 44px; height: 44px; border-radius: var(--radius-lg);
      background: var(--primary-600); color: #fff;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .form-card-title { font-size: var(--fs-xl); font-weight: 800; color: var(--gray-900); }
    .form-card-subtitle { font-size: var(--fs-xs); color: var(--gray-500); margin-top: 2px; }
    .form-card-body { padding: var(--s7); display: flex; flex-direction: column; gap: var(--s5); }
    .form-card-footer {
      padding: var(--s5) var(--s7);
      border-top: 1px solid var(--gray-200);
      display: flex; justify-content: space-between; align-items: center;
    }

    /* Grid helpers */
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s4); }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--s4); }

    /* Confidentiality Cards */
    .conf-option {
      border: 2px solid var(--gray-200); border-radius: var(--radius-lg);
      padding: var(--s5); cursor: pointer; transition: all var(--transition);
    }
    .conf-option:hover { border-color: var(--primary-300); background: var(--primary-50); }
    .conf-option.selected { border-color: var(--primary-500); background: var(--primary-50); }
    .conf-option-icon { width: 40px; height: 40px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; margin-bottom: var(--s3); }
    .conf-option-title { font-weight: 700; font-size: var(--fs-sm); color: var(--gray-800); margin-bottom: var(--s1); }
    .conf-option-desc { font-size: var(--fs-xs); color: var(--gray-500); line-height: 1.6; }

    /* Process Steps Editor */
    .process-step-item {
      background: var(--gray-50); border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-lg); padding: var(--s4);
      display: flex; align-items: flex-start; gap: var(--s3);
    }
    .ps-drag-handle { color: var(--gray-400); cursor: grab; margin-top: 4px; flex-shrink: 0; }
    .ps-num-badge { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-100); color: var(--primary-700); font-size: var(--fs-xs); font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* Screening Questions */
    .sq-item {
      background: var(--gray-50); border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-lg); padding: var(--s4);
      display: flex; align-items: center; gap: var(--s3);
    }

    /* Preview */
    .preview-section { margin-bottom: var(--s5); }
    .preview-section-title { font-size: var(--fs-xs); font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em; margin-bottom: var(--s3); }
    .preview-row { display: flex; gap: var(--s3); font-size: var(--fs-sm); padding: 5px 0; border-bottom: 1px solid var(--gray-100); }
    .preview-row:last-child { border-bottom: none; }
    .preview-label { color: var(--gray-500); min-width: 140px; flex-shrink: 0; }
    .preview-val { color: var(--gray-800); font-weight: 600; }

    /* Alert box */
    .salary-alert { display: none; margin-top: var(--s2); }
    .salary-alert.show { display: flex; }

    @media (max-width: 640px) { .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>

<div class="create-layout">

  <!-- Steps Bar -->
  <div class="steps-bar">
    <div class="steps-bar-inner" id="steps-bar"></div>

<script>
const STEPS = [
  { num: 1, label: 'פרטי תפקיד' },
  { num: 2, label: 'שכר ותנאים' },
  { num: 3, label: 'תהליך גיוס' },
  { num: 4, label: 'בדיקת מועמדים' },
  { num: 5, label: 'דיסקרטיות' },
  { num: 6, label: 'שאלות סינון' },
  { num: 7, label: 'תצוגה מקדימה' }
];

let currentStep = 1;
let formData = {
  title: '', category: '', description: '', responsibilities: '', mustHave: '', niceToHave: '',
  experienceLevel: 'mid', employmentType: 'fullTime', location: '', workModel: 'hybrid', workDays: 3,
  salaryMin: '', salaryMax: '', salaryType: 'monthly', salaryFlexible: false, includesBonus: false,
  includesStudyFund: false, includesCar: false, includesMeals: false, includesOptions: false,
  processSteps: [
    { title: 'שיחת HR', desc: 'שיחת מיון ראשונית', minutes: 20, role: 'HR' },
    { title: 'ראיון מקצועי', desc: 'ראיון עם מנהל ישיר', minutes: 45, role: 'מנהל ישיר' }
  ],
  hasAssignment: false, assignHours: '', assignPaid: false,
  humanReview: true, atsReview: false, aiAssisted: false, screeningQuestions: false,
  confidentialityLevel: 'none',
  questions: []
};

function renderStepsBar() {
  const bar = document.getElementById('steps-bar');
  bar.innerHTML = '';
  STEPS.forEach((s, i) => {
    const isDone = s.num < currentStep;
    const isActive = s.num === currentStep;
    const div = document.createElement('div');
    div.className = 'step-item';
    div.innerHTML = `
      <div class="step-circle ${isDone ? 'done' : isActive ? 'active' : ''}">
        ${isDone ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : s.num}
      </div>
      <span class="step-text ${isDone ? 'done' : isActive ? 'active' : ''}">${s.label}</span>
    `;
    if (isDone) div.style.cursor = 'pointer';
    if (isDone) div.onclick = () => goToStep(s.num);
    bar.appendChild(div);
    if (i < STEPS.length - 1) {
      const line = document.createElement('div');
      line.className = `step-connector-line ${isDone ? 'done' : ''}`;
      bar.appendChild(line);
    }
  });
}

function renderStep(n) {
  const container = document.getElementById('step-forms');
  container.innerHTML = '';
  const html = STEP_RENDERS[n]();
  container.innerHTML = html;
  bindStepEvents(n);
}

function renderProcessStep(s, i) {
  return `
    <div class="process-step-item" data-idx="${i}">
      <div class="ps-drag-handle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
      <div class="ps-num-badge">${i + 1}</div>
      <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);">
        <input type="text" class="form-input" placeholder="שם שלב" value="${s.title}" style="font-size:var(--fs-xs);">
        <input type="text" class="form-input" placeholder="תפקיד מראיין" value="${s.role}" style="font-size:var(--fs-xs);">
        <input type="text" class="form-input" placeholder="תיאור קצר" value="${s.desc}" style="font-size:var(--fs-xs);">
        <div style="display:flex;align-items:center;gap:var(--s2);"><input type="number" class="form-input" placeholder="דקות" value="${s.minutes}" style="font-size:var(--fs-xs);"><span style="font-size:var(--fs-xs);color:var(--gray-400);white-space:nowrap;">דקות</span></div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeProcessStep(${i})">×</button>
    </div>`;
}

function addProcessStep() {
  formData.processSteps.push({ title: '', desc: '', minutes: 30, role: '' });
  document.getElementById('process-steps-list').innerHTML = formData.processSteps.map(renderProcessStep).join('');
}

function removeProcessStep(i) {
  if (formData.processSteps.length <= 1) return showToast('חייב להיות לפחות שלב אחד');
  formData.processSteps.splice(i, 1);
  document.getElementById('process-steps-list').innerHTML = formData.processSteps.map(renderProcessStep).join('');
}

function addQuestion() {
  const list = document.getElementById('sq-list');
  const i = list.children.length + 1;
  const div = document.createElement('div');
  div.className = 'sq-item';
  div.innerHTML = `<span style="font-size:var(--fs-xs);font-weight:700;color:var(--gray-400);min-width:20px;">${i}</span><input type="text" class="form-input" placeholder="שאלת סינון..." style="flex:1;"><select class="form-select" style="width:130px;"><option>כן / לא</option><option>מספר</option><option>טקסט</option></select><label class="filter-option" style="white-space:nowrap;"><input type="checkbox"> חובה</label><button class="btn btn-danger btn-sm" onclick="this.closest('.sq-item').remove()">×</button>`;
  list.appendChild(div);
}

function toggleAssignment(show) {
  formData.hasAssignment = show;
  document.getElementById('assignment-details').style.display = show ? 'grid' : 'none';
}

function toggleReview(type, el) {
  el.classList.toggle('selected');
  formData[type === 'human' ? 'humanReview' : type === 'ats' ? 'atsReview' : type === 'ai' ? 'aiAssisted' : 'screeningQuestions'] = el.classList.contains('selected');
}

function selectConf(level, el) {
  document.querySelectorAll('.conf-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  formData.confidentialityLevel = level;
}

function checkSalaryRange() {
  const min = parseFloat(document.getElementById('f-salmin').value) || 0;
  const max = parseFloat(document.getElementById('f-salmax').value) || 0;
  const warn = document.getElementById('salary-warning');
  if (min && max && (max - min) / min > 0.6) warn.classList.add('show');
  else warn.classList.remove('show');
}

function saveStep(n) {
  if (n === 1) {
    formData.title = document.getElementById('f-title').value;
    formData.category = document.getElementById('f-category').value;
    formData.description = document.getElementById('f-desc').value;
    formData.responsibilities = document.getElementById('f-resp').value;
    formData.mustHave = document.getElementById('f-must').value;
    formData.niceToHave = document.getElementById('f-nice').value;
    formData.experienceLevel = document.getElementById('f-exp').value;
    formData.employmentType = document.getElementById('f-emptype').value;
    formData.location = document.getElementById('f-loc').value;
    formData.workModel = document.getElementById('f-workmodel').value;
  }
  if (n === 2) {
    formData.salaryMin = document.getElementById('f-salmin').value;
    formData.salaryMax = document.getElementById('f-salmax').value;
    formData.includesBonus = document.getElementById('f-bonus').checked;
    formData.includesStudyFund = document.getElementById('f-study').checked;
    formData.includesCar = document.getElementById('f-car').checked;
    formData.includesMeals = document.getElementById('f-meals').checked;
    formData.includesOptions = document.getElementById('f-options').checked;
    formData.salaryFlexible = document.getElementById('f-flexible').checked;
  }
}

function nextStep(n) {
  if (n === 1 && !document.getElementById('f-title').value.trim()) return showToast('נא למלא שם תפקיד');
  if (n === 2 && (!document.getElementById('f-salmin').value || !document.getElementById('f-salmax').value)) return showToast('שכר הוא שדה חובה');
  saveStep(n);
  goToStep(n + 1);
}

function prevStep() { goToStep(currentStep - 1); }

function goToStep(n) {
  currentStep = n;
  renderStepsBar();
  renderStep(n);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function bindStepEvents(n) {
  if (n === 1) {
    const wm = document.getElementById('f-workmodel');
    if (wm) wm.addEventListener('change', () => {
      document.getElementById('workdays-group').style.display = wm.value === 'hybrid' ? '' : 'none';
    });
  }
}

function publishJob() {
  showToast('✓ המשרה פורסמה בהצלחה!');
  setTimeout(() => window.location.href = 'employer-dashboard.html', 2000);
}

function showToast(msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Init
renderStepsBar();
renderStep(1);
</script>
