<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClearJob — כניסה</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, var(--primary-700) 0%, var(--teal-700) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--s4); }
    .auth-card { background: #fff; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); width: 100%; max-width: 440px; overflow: hidden; }
    .auth-header { padding: var(--s8) var(--s8) var(--s6); text-align: center; border-bottom: 1px solid var(--gray-100); }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: var(--s2); margin-bottom: var(--s4); }
    .auth-logo-icon { width: 44px; height: 44px; background: var(--primary-600); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; }
    .auth-logo-icon svg { width: 24px; height: 24px; color: #fff; }
    .auth-logo-text { font-size: var(--fs-2xl); font-weight: 800; color: var(--primary-700); }
    .auth-title { font-size: var(--fs-xl); font-weight: 700; color: var(--gray-900); margin-bottom: var(--s1); }
    .auth-subtitle { font-size: var(--fs-sm); color: var(--gray-500); }
    .auth-body { padding: var(--s6) var(--s8); }
    .auth-footer { padding: var(--s4) var(--s8) var(--s6); text-align: center; background: var(--gray-50); border-top: 1px solid var(--gray-100); }
    .auth-footer a { color: var(--primary-600); font-weight: 600; }
    .demo-box { background: var(--info-bg); border: 1px solid var(--primary-200); border-radius: var(--radius); padding: var(--s3) var(--s4); margin-bottom: var(--s5); }
    .demo-box-title { font-size: var(--fs-xs); font-weight: 700; color: var(--info); margin-bottom: var(--s2); }
    .demo-accounts { display: flex; flex-direction: column; gap: var(--s1); }
    .demo-account { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--gray-600); }
    .demo-fill { font-size: 11px; color: var(--primary-600); cursor: pointer; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
    .demo-fill:hover { background: var(--primary-50); }
    .form-label { display: block; font-size: var(--fs-sm); font-weight: 600; color: var(--gray-700); margin-bottom: var(--s2); }
    .form-group { margin-bottom: var(--s4); }
    .form-input { width: 100%; padding: 11px var(--s4); border: 1.5px solid var(--gray-300); border-radius: var(--radius); font-size: var(--fs-md); font-family: var(--font); color: var(--gray-800); transition: border-color var(--transition), box-shadow var(--transition); background: #fff; }
    .form-input:focus { outline: none; border-color: var(--primary-500); box-shadow: 0 0 0 3px var(--primary-100); }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; top: 50%; left: var(--s4); transform: translateY(-50%); color: var(--gray-400); pointer-events: none; }
    .input-toggle { position: absolute; top: 50%; left: var(--s4); transform: translateY(-50%); cursor: pointer; color: var(--gray-400); background: none; border: none; padding: 4px; }
    .error-msg { display: none; color: var(--error); font-size: var(--fs-xs); margin-top: var(--s2); }
    .error-msg.show { display: block; }
    .alert-error { background: var(--error-bg); border: 1px solid #fecaca; border-radius: var(--radius); padding: var(--s3) var(--s4); font-size: var(--fs-sm); color: var(--error); margin-bottom: var(--s4); display: none; }
    .alert-error.show { display: block; }
    .divider { display: flex; align-items: center; gap: var(--s3); margin: var(--s5) 0; color: var(--gray-400); font-size: var(--fs-xs); }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
    .btn-google { width: 100%; background: #fff; border: 1.5px solid var(--gray-300); color: var(--gray-700); gap: var(--s3); }
    .btn-google:hover { background: var(--gray-50); }
    .btn-google img { width: 18px; height: 18px; }
    .forgot-link { font-size: var(--fs-xs); color: var(--primary-600); cursor: pointer; }
    .forgot-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <span class="auth-logo-text">ClearJob</span>
    </div>
    <h1 class="auth-title">ברוכים הבאים</h1>
    <p class="auth-subtitle">כניסה לחשבון קיים</p>
  </div>

  <div class="auth-body">
    <!-- Demo accounts (only shown in demo mode) -->
    <div class="demo-box" id="demoBox">
      <div class="demo-box-title">משתמשי דמו — לבדיקה מהירה</div>
      <div class="demo-accounts">
        <div class="demo-account">
          <span>מועמד/ת — candidate@clearjob.co.il</span>
          <span class="demo-fill" onclick="fillDemo('candidate')">מלא</span>
        </div>
        <div class="demo-account">
          <span>מעסיק — employer@clearjob.co.il</span>
          <span class="demo-fill" onclick="fillDemo('employer')">מלא</span>
        </div>
        <div class="demo-account">
          <span>אדמין — admin@clearjob.co.il</span>
          <span class="demo-fill" onclick="fillDemo('admin')">מלא</span>
        </div>
      </div>
    </div>

    <div class="alert-error" id="loginError"></div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">אימייל</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        <span class="error-msg" id="emailErr">אנא הזן אימייל תקין</span>
      </div>

      <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--s2)">
          <label class="form-label" for="password" style="margin-bottom:0">סיסמה</label>
          <span class="forgot-link" onclick="handleForgot()">שכחתי סיסמה</span>
        </div>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-input" placeholder="הסיסמה שלך" autocomplete="current-password" required>
          <button type="button" class="input-toggle" onclick="togglePassword()" title="הצג/הסתר סיסמה">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" id="passErr">אנא הזן סיסמה</span>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="loginBtn" style="margin-bottom: var(--s3)">
        כניסה
      </button>
    </form>

    <div class="divider">או</div>

    <button class="btn btn-google w-full" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      כניסה עם Google
    </button>
  </div>

  <div class="auth-footer">
    <span style="font-size:var(--fs-sm); color:var(--gray-600)">אין לך חשבון?</span>
    <a href="register.html"> הרשמה חינם</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script>
  // Show demo box only in demo mode
  if (typeof DEMO_MODE !== 'undefined' && !DEMO_MODE) {
    document.getElementById('demoBox').style.display = 'none';
  }

  function fillDemo(type) {
    const map = {
      candidate: 'candidate@clearjob.co.il',
      employer:  'employer@clearjob.co.il',
      admin:     'admin@clearjob.co.il'
    };
    document.getElementById('email').value = map[type];
    document.getElementById('password').value = 'Demo1234!';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');

    document.getElementById('emailErr').classList.remove('show');
    document.getElementById('passErr').classList.remove('show');
    errEl.classList.remove('show');

    let valid = true;
    if (!email || !email.includes('@')) { document.getElementById('emailErr').classList.add('show'); valid = false; }
    if (!password) { document.getElementById('passErr').classList.add('show'); valid = false; }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'מתחבר...';

    try {
      const { user } = await Auth.signIn(email, password);
      let profile;
      try {
        profile = await Profiles.get(user.id);
      } catch {
        profile = { role: user.role || 'candidate' };
      }
      const dest = APP_CONFIG.routes[profile.role] || 'index.html';
      window.location.href = dest;
    } catch (err) {
      errEl.textContent = err.message || 'אירעה שגיאה, נסה שוב';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'כניסה';
    }
  }

  async function handleForgot() {
    const email = document.getElementById('email').value.trim();
    if (!email) { alert('הזן אימייל כדי לשחזר סיסמה'); return; }
    if (DEMO_MODE) { alert('איפוס סיסמה לא זמין במצב דמו'); return; }
    try {
      await getClient().auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/login.html' });
      alert('נשלח אימייל לאיפוס סיסמה');
    } catch (err) {
      alert('שגיאה: ' + err.message);
    }
  }

  async function handleGoogleLogin() {
    try { await signInWithGoogle(); } catch (err) { alert(err.message); }
  }

  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  // Auto-redirect if already logged in
  (async () => {
    const session = await Auth.getSession();
    if (session) {
      try {
        const profile = await Profiles.get(session.user.id);
        window.location.href = APP_CONFIG.routes[profile.role] || 'index.html';
      } catch {}
    }
  })();
</script>
</body>
</html>
