<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרטי משרה — ClearJob</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .job-detail-layout { display: grid; grid-template-columns: 1fr 360px; gap: var(--s6); align-items: flex-start; padding: var(--s6) 0 var(--s12); }
    .job-main-col {}
    .job-side-col { position: sticky; top: calc(var(--navbar-height) + 16px); }

    /* Header Card */
    .job-header-card {
      background: #fff;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-xl);
      padding: var(--s6) var(--s8);
      margin-bottom: var(--s4);
    }
    .job-breadcrumb { font-size: var(--fs-xs); color: var(--gray-500); margin-bottom: var(--s4); display: flex; align-items: center; gap: var(--s2); }
    .job-breadcrumb a { color: var(--primary-600); }
    .job-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--s4); margin-bottom: var(--s3); }
    .job-main-title { font-size: var(--fs-3xl); font-weight: 800; color: var(--gray-900); line-height: 1.2; }
    .job-company-row { display: flex; align-items: center; gap: var(--s3); margin-bottom: var(--s4); flex-wrap: wrap; }
    .company-chip {
      display: flex; align-items: center; gap: var(--s2);
      background: var(--gray-100); padding: 6px 14px;
      border-radius: var(--radius-full); font-size: var(--fs-sm); font-weight: 600; color: var(--gray-700);
    }
    .job-meta-pills { display: flex; flex-wrap: wrap; gap: var(--s2); }
    .meta-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--gray-50); border: 1px solid var(--gray-200);
      padding: 5px 12px; border-radius: var(--radius-full);
      font-size: var(--fs-xs); font-weight: 600; color: var(--gray-600);
    }

    /* Transparency Score Bar */
    .transparency-header {
      background: linear-gradient(135deg, var(--teal-50), var(--primary-50));
      border: 1.5px solid var(--teal-100);
      border-radius: var(--radius-lg);
      padding: var(--s4) var(--s5);
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--s4);
    }
    .transparency-label { font-size: var(--fs-sm); font-weight: 700; color: var(--teal-700); }
    .transparency-sub { font-size: var(--fs-xs); color: var(--teal-600); margin-top: 2px; }

    /* Section cards */
    .detail-card {
      background: #fff;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: var(--s4);
    }
    .detail-card-header {
      padding: var(--s4) var(--s5);
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; gap: var(--s3);
      font-size: var(--fs-sm); font-weight: 700; color: var(--gray-800);
      background: var(--gray-50);
    }
    .detail-card-header svg { color: var(--primary-500); }
    .detail-card-body { padding: var(--s5); }

    /* Salary Grid */
    .salary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s3); }
    .salary-item { background: var(--gray-50); border-radius: var(--radius); padding: var(--s3) var(--s4); }
    .salary-item-label { font-size: var(--fs-xs); color: var(--gray-500); margin-bottom: 4px; }
    .salary-item-value { font-size: var(--fs-sm); font-weight: 700; color: var(--gray-800); }
    .salary-main { background: var(--teal-50); border: 1.5px solid var(--teal-100); }
    .salary-main .salary-item-value { font-size: var(--fs-2xl); color: var(--teal-700); }
    .salary-main .salary-item-label { color: var(--teal-600); }

    /* Benefits */
    .benefits-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--s3); }
    .benefit-item {
      display: flex; flex-direction: column; align-items: center;
      padding: var(--s3); border-radius: var(--radius); text-align: center;
      border: 1.5px solid;
      font-size: var(--fs-xs); font-weight: 600; gap: 6px;
    }
    .benefit-item.yes { background: var(--success-bg); border-color: #bbf7d0; color: var(--success); }
    .benefit-item.no  { background: var(--gray-50); border-color: var(--gray-200); color: var(--gray-400); text-decoration: line-through; }

    /* Process Steps */
    .process-steps { display: flex; flex-direction: column; gap: 0; }
    .process-step {
      display: flex; gap: var(--s4); position: relative;
      padding-bottom: var(--s4);
    }
    .process-step:not(:last-child)::before {
      content: ''; position: absolute;
      right: 19px; top: 40px; bottom: 0;
      width: 2px; background: var(--gray-200);
    }
    .ps-num {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary-50); border: 2px solid var(--primary-200);
      color: var(--primary-600); font-weight: 800; font-size: var(--fs-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative; z-index: 1;
    }
    .ps-content { flex: 1; padding-top: 8px; }
    .ps-title { font-size: var(--fs-sm); font-weight: 700; color: var(--gray-800); }
    .ps-desc { font-size: var(--fs-xs); color: var(--gray-500); margin-top: 2px; }
    .ps-meta { display: flex; gap: var(--s3); margin-top: var(--s2); }
    .ps-chip { font-size: 11px; color: var(--gray-500); background: var(--gray-100); padding: 2px 8px; border-radius: var(--radius-full); }

    /* Stats Boxes */
    .stats-boxes { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--s3); }
    .stats-box {
      background: var(--gray-50); border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-lg); padding: var(--s4);
      text-align: center;
    }
    .stats-box-num { font-size: var(--fs-2xl); font-weight: 800; color: var(--gray-900); line-height: 1; }
    .stats-box-label { font-size: var(--fs-xs); color: var(--gray-500); margin-top: 4px; }
    .stats-box-sub { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

    /* Apply Side Card */
    .apply-card {
      background: #fff;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .apply-card-header { background: linear-gradient(135deg, var(--primary-700), var(--teal-600)); padding: var(--s5) var(--s5); color: #fff; }
    .apply-card-salary { font-size: var(--fs-2xl); font-weight: 800; color: #fff; }
    .apply-card-body { padding: var(--s5); }
    .apply-info-row { display: flex; justify-content: space-between; font-size: var(--fs-xs); padding: 6px 0; border-bottom: 1px solid var(--gray-100); }
    .apply-info-row:last-child { border-bottom: none; }
    .apply-info-label { color: var(--gray-500); }
    .apply-info-value { color: var(--gray-800); font-weight: 600; }
    .apply-card-footer { padding: var(--s5); border-top: 1px solid var(--gray-200); display: flex; flex-direction: column; gap: var(--s3); }

    /* Apply Form */
    .apply-form { display: none; }
    .apply-form.open { display: block; }
    .apply-section-title { font-size: var(--fs-md); font-weight: 700; margin-bottom: var(--s4); }

    /* Tag cloud */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: var(--s2); }
    .req-tag { padding: 5px 12px; border-radius: var(--radius-full); font-size: var(--fs-xs); font-weight: 600; }
    .req-must { background: var(--error-bg); color: var(--error); border: 1px solid #fecaca; }
    .req-nice { background: var(--primary-50); color: var(--primary-700); border: 1px solid var(--primary-200); }

    @media (max-width: 1024px) { .job-detail-layout { grid-template-columns: 1fr; } .job-side-col { position: static; } }
    @media (max-width: 768px) { .salary-grid { grid-template-columns: 1fr; } .benefits-grid { grid-template-columns: repeat(2, 1fr); } .stats-boxes { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-logo">
      <div class="navbar-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M9 12l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9S3 16.97 3 12 7.03 3 12 3s9 4.03 9 9z"/></svg>
      </div>
      ClearJob
    </a>
    <nav class="navbar-nav">
      <a href="jobs.html">משרות</a>
      <a href="index.html#employers">למעסיקים</a>
    </nav>
    <div class="navbar-actions">
      <a href="candidate-dashboard.html" class="btn btn-ghost btn-sm">האזור האישי</a>
      <a href="employer-dashboard.html" class="btn btn-primary btn-sm">פרסם משרה</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="job-detail-layout" id="job-detail-root">
    <!-- Rendered by JS -->
    <div class="empty-state">
      <p>טוען משרה...</p>
    </div>
  </div>
</div>

<!-- Apply Modal -->
<div class="modal-overlay" id="apply-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">הגשת מועמדות</div>
      <button class="btn btn-ghost btn-icon" onclick="closeApplyModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group" style="margin-bottom:var(--s4)">
        <label class="form-label">שם מלא <span class="form-required">*</span></label>
        <input type="text" class="form-input" placeholder="שם מלא">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);margin-bottom:var(--s4)">
        <div class="form-group">
          <label class="form-label">אימייל <span class="form-required">*</span></label>
          <input type="email" class="form-input" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">טלפון</label>
          <input type="tel" class="form-input" placeholder="050-0000000">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);margin-bottom:var(--s4)">
        <div class="form-group">
          <label class="form-label">ציפיות שכר <span class="form-required">*</span></label>
          <input type="number" class="form-input" placeholder="₪">
        </div>
        <div class="form-group">
          <label class="form-label">זמינות לתחילת עבודה</label>
          <select class="form-select">
            <option>מיידי</option><option>תוך 14 יום</option><option>תוך 30 יום</option><option>תוך 60 יום</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:var(--s4)">
        <label class="form-label">קורות חיים <span class="form-required">*</span></label>
        <input type="file" class="form-input" accept=".pdf,.doc,.docx" style="padding:8px;">
        <div class="form-hint">PDF, DOC, DOCX עד 5MB</div>
      </div>
      <div class="form-group" style="margin-bottom:var(--s4)">
        <label class="form-label">הערה למעסיק (אופציונלי)</label>
        <textarea class="form-textarea" placeholder="ספרו למה אתם מתאימים לתפקיד..." rows="3"></textarea>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="filter-option" style="font-size:var(--fs-xs);">
          <input type="checkbox"> חיפוש דיסקרטי — לא להציג מועמדות זו למעסיק הנוכחי שלי
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeApplyModal()">ביטול</button>
      <button class="btn btn-primary" onclick="submitApplication()">שלח מועמדות</button>
    </div>
  </div>
</div>

<!-- Success Toast -->
<div class="toast-container" id="toast-container"></div>

<script src="js/data.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const jobId = params.get('id') || 'job1';
const job = getJob(jobId);
const emp = getEmployer(job ? job.employerId : '');

function renderJobDetail() {
  if (!job) {
    document.getElementById('job-detail-root').innerHTML = '<div class="empty-state"><h3>משרה לא נמצאה</h3><p><a href="jobs.html">חזרה לחיפוש משרות</a></p></div>';
    return;
  }

  document.title = `${job.title} — ClearJob`;
  const isConfidential = emp.isConfidential;
  const companyDisplay = isConfidential ? `חברה דיסקרטית בתחום ${emp.industry}` : emp.name;

  const reviewLabels = [];
  if (job.reviewMethod.humanReview) reviewLabels.push('<div class="review-item human"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>אדם קורא</div>');
  if (job.reviewMethod.atsReview) reviewLabels.push('<div class="review-item ats"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>ATS</div>');
  if (job.reviewMethod.aiAssisted) reviewLabels.push('<div class="review-item ai"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 16v-4M12 8h.01"/></svg>AI מסייע</div>');

  const benefits = [
    { label: 'קרן השתלמות', has: job.includesStudyFund, icon: '🎓' },
    { label: 'רכב', has: job.includesCar, icon: '🚗' },
    { label: 'ארוחות', has: job.includesMeals, icon: '🍽️' },
    { label: 'אופציות', has: job.includesOptions, icon: '📈' },
    { label: 'בונוס', has: job.includesBonus, icon: '🎯' },
  ].filter(b => b.has || !b.has);

  const processSteps = job.hiringProcess.map((step, i) => `
    <div class="process-step">
      <div class="ps-num">${i + 1}</div>
      <div class="ps-content">
        <div class="ps-title">${step.title}</div>
        <div class="ps-desc">${step.description}</div>
        <div class="ps-meta">
          ${step.estimatedMinutes ? `<span class="ps-chip">~${step.estimatedMinutes} דקות</span>` : ''}
          ${step.interviewerRole ? `<span class="ps-chip">${step.interviewerRole}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  const mustReqs = job.mustHaveRequirements.map(r => `<span class="req-tag req-must">✓ ${r}</span>`).join('');
  const niceReqs = job.niceToHaveRequirements.map(r => `<span class="req-tag req-nice">+ ${r}</span>`).join('');

  const confidentialNote = isConfidential ? `
    <div class="alert alert-info" style="margin-bottom:var(--s4);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <div>
        <strong>משרה דיסקרטית</strong><br>
        <span style="font-size:var(--fs-xs);">המעסיק בחר לפרסם את המשרה בדיסקרטיות. שם החברה אינו גלוי בשלב זה, אך כל פרטי השכר, התהליך ותנאי המשרה מוצגים באופן מלא. ${emp.revealCondition ? `שם החברה ייחשף: ${emp.revealCondition}.` : ''}</span>
      </div>
    </div>
  ` : '';

  const html = `
    <!-- Main Column -->
    <div class="job-main-col">

      <!-- Header -->
      <div class="job-header-card">
        <div class="job-breadcrumb">
          <a href="jobs.html">← משרות</a>
          <span>›</span>
          <span>${job.category}</span>
          <span>›</span>
          <span>${job.title}</span>
        </div>

        ${confidentialNote}

        <div class="job-title-row">
          <h1 class="job-main-title">${job.title}</h1>
          ${isConfidential ? '<span class="confidential-banner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> דיסקרטי</span>' : ''}
        </div>

        <div class="job-company-row">
          <div class="company-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            ${companyDisplay}
          </div>
          ${!isConfidential ? `<span class="badge badge-success"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>מעסיק מאומת</span>` : ''}
          ${emp.tags && emp.tags.length ? emp.tags.slice(0,2).map(t => `<span class="badge badge-primary">${t}</span>`).join('') : ''}
        </div>

        <div class="job-meta-pills">
          <div class="meta-pill"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${job.location}</div>
          <div class="meta-pill"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>פורסם ${formatDate(job.createdAt)} · עודכן ${formatDate(job.updatedAt)}</div>
          <div class="meta-pill">${WORK_MODEL_LABELS[job.workModel]}${job.workModel==='hybrid' ? ` · ${job.workDaysOffice} ימים` : ''}</div>
          <div class="meta-pill">${EMPLOYMENT_TYPE_LABELS[job.employmentType]}</div>
          <div class="meta-pill">${EXPERIENCE_LABELS[job.experienceLevel]}</div>
          ${job.lastBoostedAt ? `<div class="meta-pill" style="background:var(--warning-bg);border-color:#fde68a;color:var(--warning);">הוקפץ ${formatDate(job.lastBoostedAt)}</div>` : ''}
        </div>
      </div>

      <!-- Transparency Score -->
      <div class="transparency-header">
        <div>
          <div class="transparency-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-left:4px;"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
            ציון שקיפות: ${job.transparencyScore}%
          </div>
          <div class="transparency-sub">כל המידע הנדרש לקבלת החלטה מושכלת — מוצג כאן</div>
        </div>
        <div style="text-align:left;">
          <div class="progress-bar" style="width:120px;">
            <div class="progress-fill" style="width:${job.transparencyScore}%;"></div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="detail-card">
        <div class="detail-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          סטטוס המשרה — בזמן אמת
        </div>
        <div class="detail-card-body">
          <div class="stats-boxes">
            <div class="stats-box">
              <div class="stats-box-num">${job.applicantCount}</div>
              <div class="stats-box-label">הגישו מועמדות</div>
            </div>
            <div class="stats-box">
              <div class="stats-box-num">${job.viewedApplicantCount}</div>
              <div class="stats-box-label">קורות חיים נפתחו</div>
              <div class="stats-box-sub">${Math.round(job.viewedApplicantCount/job.applicantCount*100)}% מהמגישים</div>
            </div>
            <div class="stats-box">
              <div class="stats-box-num">${job.interviewCount}</div>
              <div class="stats-box-label">הגיעו לראיון</div>
            </div>
            <div class="stats-box">
              <div class="stats-box-num">${job.rejectedCount}</div>
              <div class="stats-box-label">נדחו</div>
            </div>
            <div class="stats-box">
              <div class="stats-box-num">${job.pendingCount}</div>
              <div class="stats-box-label">ממתינים לבדיקה</div>
            </div>
            <div class="stats-box">
              <div class="stats-box-num">${job.averageResponseDays}</div>
              <div class="stats-box-label">ימי תגובה ממוצע</div>
            </div>
            <div class="stats-box">
              <div class="stats-box-num">${job.averageProcessDays}</div>
              <div class="stats-box-label">ימי תהליך ממוצע</div>
            </div>
            <div class="stats-box">
              <div class="stats-box-num">${job.hiringProcess.length}</div>
              <div class="stats-box-label">שלבים בתהליך</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Salary -->
      <div class="detail-card">
        <div class="detail-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          שכר ותנאים
        </div>
        <div class="detail-card-body">
          <div class="salary-grid" style="margin-bottom:var(--s4);">
            <div class="salary-item salary-main" style="grid-column:1/4;">
              <div class="salary-item-label">טווח שכר חודשי</div>
              <div class="salary-item-value">${formatSalary(job.salaryMin, job.salaryMax, job.salaryType)}</div>
              ${job.salaryFlexible ? '<div style="font-size:11px;color:var(--teal-500);margin-top:3px;">גמישות קיימת למועמד/ת חזק/ה</div>' : ''}
              ${job.salaryNotes ? `<div style="font-size:var(--fs-xs);color:var(--teal-600);margin-top:4px;">${job.salaryNotes}</div>` : ''}
            </div>
          </div>
          <div class="benefits-grid">
            ${benefits.map(b => `
              <div class="benefit-item ${b.has ? 'yes' : 'no'}">
                <span style="font-size:18px;">${b.icon}</span>
                <span>${b.label}</span>
                ${b.has && b.label === 'בונוס' ? `<span style="font-size:10px;">${job.bonusPercent}% שנתי</span>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <!-- Review Method -->
      <div class="detail-card">
        <div class="detail-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          איך קורות החיים שלך ייבדקו?
        </div>
        <div class="detail-card-body">
          <div class="review-method" style="margin-bottom:var(--s4);">${reviewLabels.join('')}</div>
          <div class="alert alert-info" style="font-size:var(--fs-xs);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            המידע הזה מוצג כדי שתדע/י איך התהליך עובד ומה קורה אחרי ההגשה. אין "נכון" או "לא נכון" — רק שקיפות.
          </div>
          ${job.reviewMethod.screeningQuestions ? '<div class="badge badge-warning" style="margin-top:var(--s3);">יש שאלות סינון — ישפיעו על סינון ראשוני</div>' : ''}
        </div>
      </div>

      <!-- Process -->
      <div class="detail-card">
        <div class="detail-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          תהליך הגיוס — ${job.hiringProcess.length} שלבים
        </div>
        <div class="detail-card-body">
          <div class="process-steps">${processSteps}</div>
          <hr class="divider">
          <div style="display:flex;gap:var(--s4);flex-wrap:wrap;font-size:var(--fs-xs);color:var(--gray-600);">
            <span><strong>זמן ממוצע לסיום:</strong> ${job.averageProcessDays}–${job.averageProcessDays + 7} ימים</span>
            <span><strong>מטלת בית:</strong> ${job.hasHomeAssignment ? `כן (${job.homeAssignmentEstimatedHours} שעות)${job.homeAssignmentPaid ? ' — בתשלום' : ''}` : 'אין'}</span>
            <span><strong>ממליצים:</strong> רק בשלב סופי</span>
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="detail-card">
        <div class="detail-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          תיאור התפקיד
        </div>
        <div class="detail-card-body">
          <p style="font-size:var(--fs-sm);color:var(--gray-700);line-height:1.8;margin-bottom:var(--s4);">${job.description}</p>
          <div style="margin-bottom:var(--s4);">
            <div style="font-size:var(--fs-xs);font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--s3);">תחומי אחריות</div>
            <ul style="list-style:none;display:flex;flex-direction:column;gap:var(--s2);">
              ${job.responsibilities.map(r => `<li style="font-size:var(--fs-sm);color:var(--gray-700);display:flex;align-items:flex-start;gap:var(--s2);"><span style="color:var(--teal-500);flex-shrink:0;margin-top:2px;">✓</span>${r}</li>`).join('')}
            </ul>
          </div>
          <div style="margin-bottom:var(--s3);">
            <div style="font-size:var(--fs-xs);font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--s3);">דרישות חובה</div>
            <div class="tag-cloud">${mustReqs}</div>
          </div>
          ${niceReqs ? `<div>
            <div style="font-size:var(--fs-xs);font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--s3);">יתרון</div>
            <div class="tag-cloud">${niceReqs}</div>
          </div>` : ''}
        </div>
      </div>

    </div>

    <!-- Side Column -->
    <div class="job-side-col">
      <div class="apply-card">
        <div class="apply-card-header">
          <div style="font-size:var(--fs-xs);color:rgba(255,255,255,.7);margin-bottom:4px;">שכר</div>
          <div class="apply-card-salary">${formatSalary(job.salaryMin, job.salaryMax, job.salaryType)}</div>
          ${job.salaryFlexible ? '<div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px;">גמישות קיימת</div>' : ''}
        </div>
        <div class="apply-card-body">
          <div class="apply-info-row">
            <span class="apply-info-label">מיקום</span>
            <span class="apply-info-value">${job.location}</span>
          </div>
          <div class="apply-info-row">
            <span class="apply-info-label">מודל עבודה</span>
            <span class="apply-info-value">${WORK_MODEL_LABELS[job.workModel]}</span>
          </div>
          <div class="apply-info-row">
            <span class="apply-info-label">שלבים</span>
            <span class="apply-info-value">${job.hiringProcess.length} שלבים</span>
          </div>
          <div class="apply-info-row">
            <span class="apply-info-label">תגובה ממוצע</span>
            <span class="apply-info-value">${job.averageResponseDays} ימים</span>
          </div>
          <div class="apply-info-row">
            <span class="apply-info-label">מגישים</span>
            <span class="apply-info-value">${job.applicantCount}</span>
          </div>
          <div class="apply-info-row">
            <span class="apply-info-label">סינון</span>
            <span class="apply-info-value">${[job.reviewMethod.humanReview && 'אדם', job.reviewMethod.atsReview && 'ATS', job.reviewMethod.aiAssisted && 'AI'].filter(Boolean).join(' + ')}</span>
          </div>
          <div class="apply-info-row" style="border:none;">
            <span class="apply-info-label">מטלת בית</span>
            <span class="apply-info-value">${job.hasHomeAssignment ? `כן (${job.homeAssignmentEstimatedHours}h)` : 'אין'}</span>
          </div>
        </div>
        <div class="apply-card-footer">
          <button class="btn btn-primary" style="font-size:var(--fs-md);" onclick="openApplyModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            הגש/י מועמדות
          </button>
          <button class="btn btn-secondary" onclick="toggleSave(this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            שמור משרה
          </button>
        </div>
      </div>

      <!-- Employer Card -->
      <div class="detail-card" style="margin-top:var(--s4);">
        <div class="detail-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          על המעסיק
        </div>
        <div class="detail-card-body" style="font-size:var(--fs-sm);">
          <div style="display:flex;flex-direction:column;gap:var(--s2);">
            <div class="apply-info-row"><span class="apply-info-label">תחום</span><span class="apply-info-value">${emp.industry}</span></div>
            <div class="apply-info-row"><span class="apply-info-label">גודל</span><span class="apply-info-value">${emp.size} עובדים</span></div>
            <div class="apply-info-row"><span class="apply-info-label">סוג</span><span class="apply-info-value">${emp.employerType === 'direct' ? 'מעסיק ישיר' : 'חברת השמה'}</span></div>
            ${isConfidential && emp.revealCondition ? `<div class="apply-info-row"><span class="apply-info-label">שם ייחשף</span><span class="apply-info-value" style="font-size:var(--fs-xs);">${emp.revealCondition}</span></div>` : ''}
            ${emp.tags && emp.tags.length ? `<div style="display:flex;flex-wrap:wrap;gap:var(--s2);margin-top:var(--s2);">${emp.tags.map(t => `<span class="badge badge-success">${t}</span>`).join('')}</div>` : ''}
          </div>
          <div class="alert alert-info" style="margin-top:var(--s4);font-size:var(--fs-xs);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            זמן תגובה ממוצע של המעסיק: <strong>${emp.responseTime} ימים</strong> · ${emp.responseRate}% מועמדים קיבלו תשובה
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('job-detail-root').innerHTML = html;
}

function openApplyModal() {
  document.getElementById('apply-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeApplyModal() {
  document.getElementById('apply-modal').style.display = 'none';
  document.body.style.overflow = '';
}

function submitApplication() {
  closeApplyModal();
  showToast('✓ המועמדות נשלחה בהצלחה! תוכל/י לעקוב אחריה באזור האישי.');
  setTimeout(() => { window.location.href = 'candidate-dashboard.html'; }, 2500);
}

function toggleSave(btn) {
  const saved = btn.dataset.saved === 'true';
  btn.dataset.saved = !saved;
  btn.innerHTML = saved
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>שמור משרה'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>נשמר!';
  if (!saved) showToast('📌 המשרה נשמרה לאזור האישי');
}

function showToast(msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

renderJobDetail();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/mobile.js"></script>
</body>
</html>
